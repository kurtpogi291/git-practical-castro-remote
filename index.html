<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Website</title>
</head>
<body>

    <h1>Hello World</h1>

    <p id="parag1">This is my practical examination</p>

    <button id="btn1">Alert Me</button>
    <button id="btn2">Change Color</button>

    <script>
        const paragraph = document.getElementById("parag1");

        const alertButton = document.querySelector("#btn1");
        const colorButton = document.querySelector("#btn2");

        alertButton.addEventListener("click", function () {
            alert("Button 1 triggered");
        });

        colorButton.addEventListener("dblclick", function () {
            paragraph.style.color = "red";
        });
    </script>

</body>
</html>
